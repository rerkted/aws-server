events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1000;

  # ── HTTP server (always active) ────────────────────────────
  server {
    listen 80;
    server_name rerktserver.com www.rerktserver.com;

    # Required for Certbot ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Serve site on HTTP (redirects to HTTPS once certs exist)
    location / {
      try_files $uri $uri/ /index.html;
    }

    location /health {
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location ~* \.(css|js|png|jpg|ico|woff2|svg|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }
  }
}