events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1000;

  # ── Redirect HTTP → HTTPS ───────────────────────────────────
  server {
    listen 80;
    server_name rerktserver.com www.rerktserver.com _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ───────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name rerktserver.com www.rerktserver.com;

    root  /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/rerktserver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rerktserver.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location ~* \.(css|js|png|jpg|ico|woff2|svg|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    location / {
      try_files $uri /index.html =404;
    }
  }
}