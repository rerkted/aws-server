events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1000;

  # ── Redirect all HTTP → HTTPS ──────────────────────────────
  server {
    listen 80;
    server_name rerktserver.com www.rerktserver.com;

    # Required for Certbot HTTP-01 challenge (cert renewal)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS server ───────────────────────────────────────────
  server {
    listen 443 ssl;
    http2  on;
    server_name rerktserver.com www.rerktserver.com;

    root  /usr/share/nginx/html;
    index index.html;

    # ── SSL certificates (managed by Certbot on the host) ──
    ssl_certificate     /etc/letsencrypt/live/rerktserver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rerktserver.com/privkey.pem;

    # ── Modern SSL hardening ────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # OCSP Stapling — faster cert validation for visitors
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/rerktserver.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Cache static assets ─────────────────────────────────
    location ~* \.(css|js|png|jpg|ico|woff2|svg|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # ── Health check (used by GitHub Actions) ───────────────
    location /health {
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    # ── SPA fallback ────────────────────────────────────────
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
