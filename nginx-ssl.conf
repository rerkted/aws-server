events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  server_tokens off;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1000;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=contact:10m rate=2r/m;
  limit_req_zone $binary_remote_addr zone=ai:10m rate=10r/m;

  # ── Redirect HTTP → HTTPS ───────────────────────────────────
  server {
    listen 80;
    server_name DOMAIN_NAME www.DOMAIN_NAME ai.DOMAIN_NAME agent.DOMAIN_NAME _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Portfolio ────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name DOMAIN_NAME www.DOMAIN_NAME;

    root  /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_NAME/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://formspree.io; frame-ancestors 'none';" always;

    location /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location ~* \.(css|js|png|jpg|ico|woff2|svg|webp)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    location / {
      limit_req zone=general burst=30 nodelay;
      try_files $uri /index.html =404;
    }
  }

  # ── AI Chat — ai.DOMAIN_NAME ────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name ai.DOMAIN_NAME;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_NAME/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    location /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Proxy API requests to Node.js container
    location /api/ {
      limit_req zone=ai burst=5 nodelay;
      proxy_pass         http://172.17.0.1:3001;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_connect_timeout 5s;
    }

    # Serve chat UI
    location / {
      limit_req zone=general burst=30 nodelay;
      root  /usr/share/nginx/ai;
      index index.html;
      try_files $uri /index.html =404;
    }
  }

  # ── Infrastructure AI Agent — agent.DOMAIN_NAME ─────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name agent.DOMAIN_NAME;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN_NAME/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_NAME/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # WebSocket — real-time agent communication
    location /ws/ {
      limit_req zone=ai burst=10 nodelay;
      proxy_pass         http://172.17.0.1:3003;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # All other requests to FastAPI
    location / {
      limit_req zone=general burst=30 nodelay;
      proxy_pass         http://172.17.0.1:3003;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_connect_timeout 5s;
    }
  }
}
