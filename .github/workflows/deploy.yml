# ─── .github/workflows/deploy.yml ────────────────────────────────
# Full CI/CD: Security → Build → Deploy → Verify → DAST → Cleanup → Done
# Auth: OIDC federation — no long-lived AWS access keys

name: Build & Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: portfolio
  AI_IMAGE_NAME: ${{ vars.AI_IMAGE_NAME || 'chat-ai' }}
  AGENT_IMAGE_NAME: agent-ai
  SSM_NAMESPACE: ${{ vars.SSM_NAMESPACE || 'rerktserver' }}
  DOMAIN_NAME: ${{ vars.DOMAIN_NAME || 'rerktserver.com' }}

jobs:
  # ── STAGE 1: Security Scans ───────────────────────────────────
  security:
    name: "Stage 1 — Security"
    uses: rerkted/devsecops-pipeline/.github/workflows/security.yml@main
    with:
      terraform-dir: terraform
      node-dirs: '. chat'
      language: javascript
      severity-threshold: HIGH
    permissions:
      security-events: write
      actions: read
      contents: read

  # ── STAGE 2: Build & Push Docker Images ───────────────────────
  build:
    name: "Stage 2 — Build"
    runs-on: ubuntu-latest
    needs: security
    permissions:
      id-token: write
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (portfolio)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Extract metadata (ai proxy)
        id: meta-ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.AI_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Extract metadata (agent)
        id: meta-agent
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.AGENT_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push portfolio image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: DOMAIN_NAME=${{ env.DOMAIN_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Rerkt.AI proxy image
        uses: docker/build-push-action@v5
        with:
          context: ./chat
          push: true
          tags: ${{ steps.meta-ai.outputs.tags }}
          labels: ${{ steps.meta-ai.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan portfolio image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0, pinned for supply-chain safety
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Scan Rerkt.AI image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0, pinned for supply-chain safety
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.AI_IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Build and push Agent AI image
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan Agent AI image (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0, pinned for supply-chain safety
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.AGENT_IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

  # ── STAGE 3: Deploy to EC2 ────────────────────────────────────
  deploy:
    name: "Stage 3 — Deploy"
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Deployed independently of the container fleet below. Skips
      # gracefully (does not fail the job) if the function doesn't exist
      # yet — it's created by `terraform apply` (local state, applied
      # manually, see migration plan), not by this pipeline. Runs before
      # the SSM container deploy so a real packaging failure (once the
      # function exists) surfaces fast, without ever blocking the
      # container deploy that follows — that deploy must succeed
      # regardless of this Lambda step's outcome.
      - name: Package and deploy chat-ai Lambda
        run: |
          if ! aws lambda get-function --function-name chat-ai --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "chat-ai Lambda function doesn't exist yet (run terraform apply first) — skipping, not failing the build"
            exit 0
          fi
          cd chat
          npm ci --omit=dev
          zip -rq ../chat-ai-lambda.zip .
          cd ..
          aws lambda update-function-code \
            --function-name chat-ai \
            --zip-file fileb://chat-ai-lambda.zip \
            --region ${{ env.AWS_REGION }} > /dev/null
          aws lambda wait function-updated \
            --function-name chat-ai \
            --region ${{ env.AWS_REGION }}
          echo "chat-ai Lambda code updated"

      - name: Deploy via SSM
        timeout-minutes: 70
        run: |
          PORTFOLIO_IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.IMAGE_NAME }}:latest"
          AI_IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.AI_IMAGE_NAME }}:latest"
          AGENT_IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.AGENT_IMAGE_NAME }}:latest"
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "/${{ env.SSM_NAMESPACE }}/portfolio/instance-id" \
            --query "Parameter.Value" \
            --output text)
          REGISTRY="${{ needs.build.outputs.ecr-registry }}"

          # Built here (runner-side, with jq) rather than as an inline
          # JSON-parsing script inside the SSM commands array below —
          # deeply nested quoting in that array is fragile (see
          # cloudfront.tf's git history for an unrelated but similar
          # escaping bug). IPv4 only: CloudFront's connections to
          # custom origins are IPv4-only regardless of is_ipv6_enabled
          # on the viewer side, so IPv6 ranges aren't needed here.
          REALIP_CONF=$(
            curl -s https://ip-ranges.amazonaws.com/ip-ranges.json \
              | jq -r '.prefixes[] | select(.service=="CLOUDFRONT") | "set_real_ip_from \(.ip_prefix);"'
          )
          REALIP_CONF="${REALIP_CONF}
          real_ip_header X-Forwarded-For;
          real_ip_recursive on;"
          REALIP_CONF_B64=$(echo "$REALIP_CONF" | base64 -w0)
          if [ "${#REALIP_CONF_B64}" -gt 80000 ]; then
            echo "CloudFront IP range list grew unexpectedly large (${#REALIP_CONF_B64} chars base64) — failing fast rather than risking an SSM size error"
            exit 1
          fi

          # Same base64-delivery approach as REALIP_CONF above, and for the
          # same reason: this content references an nginx variable
          # ($http_x_origin_verify), so building it inline inside the
          # already-escaped SSM commands array would need several more
          # levels of quote-escaping than agent-allowlist.conf's simpler
          # single-line case. Fetched directly here (not via a remote SSM
          # command) since the runner's OIDC role already has ssm:GetParameter
          # + kms:Decrypt — see oidc.tf.
          #
          # Graceful no-op fallback (not just a skip) is required here,
          # unlike the Lambda/invalidation steps: nginx-ssl.conf's `include`
          # for this file is unconditional, so nginx would fail to start
          # entirely without SOME valid file — and a "deny by default"
          # fallback would break 100% of agent.'s current direct traffic
          # immediately on deploy, well before the actual DNS cutover to
          # CloudFront happens. A no-op conf keeps nginx starting and
          # direct access working exactly as before; the check activates
          # for real automatically once `terraform apply` creates the real
          # secret and the next deploy picks it up.
          ORIGIN_VERIFY_SECRET=$(aws ssm get-parameter \
            --name "/${{ env.SSM_NAMESPACE }}/agent/origin-verify-secret" \
            --with-decryption --query "Parameter.Value" --output text \
            --region ${{ env.AWS_REGION }} 2>/dev/null) || true
          if [ -z "$ORIGIN_VERIFY_SECRET" ]; then
            echo "agent/origin-verify-secret doesn't exist yet (run terraform apply first) — writing a no-op conf so nginx still starts; the check activates automatically once the secret exists"
            ORIGIN_VERIFY_CONF="# origin-verify secret not yet provisioned by terraform apply — no-op until it exists"
          else
            ORIGIN_VERIFY_CONF="if (\$http_x_origin_verify != \"$ORIGIN_VERIFY_SECRET\") { return 403; }"
          fi
          ORIGIN_VERIFY_CONF_B64=$(echo "$ORIGIN_VERIFY_CONF" | base64 -w0)

          COMMAND=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 3600 \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY\",

              \"AGENT_ALLOWED_IP=\$(aws ssm get-parameter --name /${{ env.SSM_NAMESPACE }}/agent/allowed-ip --query Parameter.Value --output text --region ${{ env.AWS_REGION }})\",
              \"mkdir -p /etc/nginx/conf.d && echo \\\"allow \$AGENT_ALLOWED_IP; deny all;\\\" > /etc/nginx/conf.d/agent-allowlist.conf\",

              \"echo $REALIP_CONF_B64 | base64 -d > /etc/nginx/conf.d/cloudfront-realip.conf\",

              \"echo $ORIGIN_VERIFY_CONF_B64 | base64 -d > /etc/nginx/conf.d/agent-origin-verify.conf\",

              \"docker pull $PORTFOLIO_IMAGE\",
              \"docker stop portfolio || true\",
              \"docker rm portfolio || true\",
              \"docker run -d --name portfolio --restart always -p 80:80 -p 443:443 -v /etc/letsencrypt:/etc/letsencrypt:ro -v /var/www/certbot:/var/www/certbot -v /etc/nginx/conf.d:/etc/nginx/conf.d:ro $PORTFOLIO_IMAGE nginx -c /etc/nginx/nginx-ssl.conf -g 'daemon off;'\",

              \"docker pull $AI_IMAGE\",
              \"docker stop rerkt-ai || true\",
              \"docker rm rerkt-ai || true\",
              \"ANTHROPIC_KEY=\$(aws ssm get-parameter --name /${{ env.SSM_NAMESPACE }}/anthropic-api-key --with-decryption --query Parameter.Value --output text --region ${{ env.AWS_REGION }})\",
              \"docker run -d --name rerkt-ai --restart always -p 172.17.0.1:3001:3001 -e ANTHROPIC_API_KEY=\$ANTHROPIC_KEY -e DOMAIN_NAME=${{ env.DOMAIN_NAME }} $AI_IMAGE\",

              \"docker pull $AGENT_IMAGE\",
              \"docker stop agent-ai || true\",
              \"docker rm agent-ai || true\",
              \"AGENT_KEY=\$(aws ssm get-parameter --name /${{ env.SSM_NAMESPACE }}/anthropic-api-key --with-decryption --query Parameter.Value --output text --region ${{ env.AWS_REGION }})\",
              \"docker run -d --name agent-ai --restart always -p 172.17.0.1:3003:3003 -e ANTHROPIC_API_KEY=\$AGENT_KEY -e AWS_REGION=${{ env.AWS_REGION }} $AGENT_IMAGE\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND"

          for i in $(seq 1 240); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/240] Status: $STATUS"
            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              break
            fi
          done

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

          echo "Deployment complete"

      # nginx doesn't set Cache-Control on / or index.html (only on
      # fingerprinted static assets), so without this a push could take
      # up to a day to show up publicly once CloudFront is in front —
      # see terraform/cloudfront.tf. Skips gracefully (does not fail the
      # build) until Phase 1's distribution exists — same pattern as the
      # chat-ai Lambda step above.
      - name: Invalidate CloudFront cache (portfolio)
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/${{ env.SSM_NAMESPACE }}/portfolio/cloudfront-distribution-id" \
            --query "Parameter.Value" --output text 2>/dev/null) || {
            echo "No CloudFront distribution yet (run terraform apply first) — skipping, not failing the build"
            exit 0
          }
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*" > /dev/null
          echo "CloudFront invalidation requested for distribution $DIST_ID"

      # Same reasoning as the portfolio invalidation above, for the
      # ai. chat UI's separate distribution — see terraform/cloudfront.tf.
      # Skips gracefully until Phase 2's distribution exists.
      - name: Invalidate CloudFront cache (ai)
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/${{ env.SSM_NAMESPACE }}/ai/cloudfront-distribution-id" \
            --query "Parameter.Value" --output text 2>/dev/null) || {
            echo "No CloudFront distribution yet (run terraform apply first) — skipping, not failing the build"
            exit 0
          }
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*" > /dev/null
          echo "CloudFront invalidation requested for distribution $DIST_ID"

  # ── STAGE 4: Verify ───────────────────────────────────────────
  verify:
    name: "Stage 4 — Verify"
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Uses the domain name, not the raw EIP — Phase 4 restricts port 443
      # to CloudFront's origin-facing IPs only, and GitHub Actions runners
      # aren't in that range. See migration plan Phase 4.
      - name: Health check — Portfolio
        run: |
          sleep 10
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://${{ env.DOMAIN_NAME }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "Portfolio health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Portfolio health check passed — HTTP $STATUS"

      - name: Health check — Rerkt.AI (nginx reachability)
        run: |
          # Note: this only confirms nginx itself is up — nginx answers
          # /health directly (see nginx-ssl.conf) without ever reaching
          # the backend. The step below actually tests the backend.
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://ai.${{ env.DOMAIN_NAME }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "Rerkt.AI health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Rerkt.AI health check passed — HTTP $STATUS"

      - name: Health check — chat-ai Lambda (direct invoke)
        run: |
          # Skips gracefully (does not fail the build) until the function
          # exists — see the note on the "Package and deploy chat-ai
          # Lambda" step in the deploy job.
          if ! aws lambda get-function --function-name chat-ai --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "chat-ai Lambda function doesn't exist yet — skipping, not failing the build"
            exit 0
          fi
          # Constructs a minimal Function URL (API Gateway v2 payload
          # format) event for GET /health and invokes the Lambda directly
          # — this is the first real end-to-end test of the SSM secret
          # fetch + Express app + serverless-http chain, independent of
          # whether nginx has been cut over to it yet. Best-effort event
          # shape based on the standard v2.0 payload format — verify this
          # step passes on the first real run and adjust if needed.
          cat > /tmp/health-event.json <<'EOF'
          {
            "version": "2.0",
            "routeKey": "GET /health",
            "rawPath": "/health",
            "rawQueryString": "",
            "headers": {},
            "requestContext": {
              "http": { "method": "GET", "path": "/health", "sourceIp": "0.0.0.0" }
            },
            "isBase64Encoded": false
          }
          EOF
          aws lambda invoke \
            --function-name chat-ai \
            --payload file:///tmp/health-event.json \
            --cli-binary-format raw-in-base64-out \
            --region ${{ env.AWS_REGION }} \
            /tmp/health-response.json
          cat /tmp/health-response.json
          STATUS_CODE=$(python3 -c "import json; print(json.load(open('/tmp/health-response.json')).get('statusCode', 'missing'))")
          if [ "$STATUS_CODE" != "200" ]; then
            echo "chat-ai Lambda health check failed — statusCode: $STATUS_CODE"
            exit 1
          fi
          echo "chat-ai Lambda health check passed"

      - name: Health check — Agent AI
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://agent.${{ env.DOMAIN_NAME }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "Agent AI health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Agent AI health check passed — HTTP $STATUS"

  # ── STAGE 5: DAST ─────────────────────────────────────────────
  dast:
    name: "Stage 5 — DAST"
    needs: verify
    uses: rerkted/devsecops-pipeline/.github/workflows/dast.yml@main
    with:
      target-url: https://${{ vars.DOMAIN_NAME || 'rerktserver.com' }}
      severity-threshold: HIGH
    permissions:
      contents: read
      issues: write

  # ── STAGE 6: Cleanup ──────────────────────────────────────────
  cleanup:
    name: "Stage 6 — Cleanup"
    needs: dast
    uses: rerkted/devsecops-pipeline/.github/workflows/cleanup.yml@main
    with:
      ssm-instance-param: /${{ vars.SSM_NAMESPACE || 'rerktserver' }}/portfolio/instance-id
      aws-region: us-east-1
    secrets:
      role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
    permissions:
      id-token: write
      contents: read

  # ── STAGE 7: Done ─────────────────────────────────────────────
  done:
    name: "Stage 7 — Done"
    needs: [security, build, deploy, verify, dast, cleanup]
    if: always()
    uses: rerkted/devsecops-pipeline/.github/workflows/done.yml@main
    with:
      security-result: ${{ needs.security.result }}
      build-result: ${{ needs.build.result }}
      deploy-result: ${{ needs.deploy.result }}
      verify-result: ${{ needs.verify.result }}
      dast-result: ${{ needs.dast.result }}
      cleanup-result: ${{ needs.cleanup.result }}
      service-name: Portfolio — ${{ vars.DOMAIN_NAME || 'rerktserver.com' }}
      service-url: https://${{ vars.DOMAIN_NAME || 'rerktserver.com' }}
    permissions:
      contents: read
