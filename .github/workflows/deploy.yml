## ─── .github/workflows/deploy.yml ─────────────────────────────
# Full CI/CD: Push → Build images → Push to ECR → Deploy to EC2
# Auth: OIDC federation — no long-lived AWS access keys

name: Build & Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: portfolio
  AI_IMAGE_NAME: rerkt-ai
  BEDROCK_IMAGE_NAME: bedrock-ai

jobs:
  # ── JOB 1: Build & Push Docker Images ────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (portfolio)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Extract metadata (ai proxy)
        id: meta-ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.AI_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Extract metadata (bedrock proxy)
        id: meta-bedrock
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.BEDROCK_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push portfolio image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Rerkt.AI proxy image
        uses: docker/build-push-action@v5
        with:
          context: ./chat
          push: true
          tags: ${{ steps.meta-ai.outputs.tags }}
          labels: ${{ steps.meta-ai.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Bedrock proxy image
        uses: docker/build-push-action@v5
        with:
          context: ./bedrock
          push: true
          tags: ${{ steps.meta-bedrock.outputs.tags }}
          labels: ${{ steps.meta-bedrock.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan portfolio image for vulnerabilities
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Scan AI proxy image for vulnerabilities
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.AI_IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Scan Bedrock proxy image for vulnerabilities
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.BEDROCK_IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

  # ── JOB 2: Deploy to EC2 ─────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        timeout-minutes: 25
        run: |
          PORTFOLIO_IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.IMAGE_NAME }}:latest"
          AI_IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.AI_IMAGE_NAME }}:latest"
          BEDROCK_IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.BEDROCK_IMAGE_NAME }}:latest"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"
          REGISTRY="${{ needs.build.outputs.ecr-registry }}"

          COMMAND=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY\",

              \"docker pull $PORTFOLIO_IMAGE\",
              \"docker stop portfolio || true\",
              \"docker rm portfolio || true\",
              \"docker run -d --name portfolio --restart always -p 80:80 -p 443:443 -v /etc/letsencrypt:/etc/letsencrypt:ro -v /var/www/certbot:/var/www/certbot $PORTFOLIO_IMAGE nginx -c /etc/nginx/nginx-ssl.conf -g 'daemon off;'\",

              \"docker pull $AI_IMAGE\",
              \"docker stop rerkt-ai || true\",
              \"docker rm rerkt-ai || true\",
              \"docker run -d --name rerkt-ai --restart always -p 172.17.0.1:3001:3001 -e ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} $AI_IMAGE\",

              \"docker pull $BEDROCK_IMAGE\",
              \"docker stop bedrock-ai || true\",
              \"docker rm bedrock-ai || true\",
              \"docker run -d --name bedrock-ai --restart always -p 172.17.0.1:3002:3002 $BEDROCK_IMAGE\",

              \"docker image prune -f\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND"

          # Poll until complete — ssm wait has a hardcoded 100s limit which is too short
          for i in $(seq 1 80); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] Status: $STATUS"
            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              break
            fi
          done

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

          echo "Deployment complete"

      - name: Health check — portfolio
        run: |
          sleep 10
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://${{ secrets.EC2_PUBLIC_IP }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "Portfolio health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Portfolio health check passed — HTTP $STATUS"

      - name: Health check — Rerkt.AI
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://ai.rerktserver.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Rerkt.AI health check returned HTTP $STATUS (SSL cert may need renewal for new subdomain)"
          else
            echo "Rerkt.AI health check passed — HTTP $STATUS"
          fi

      - name: Health check — Bedrock AI
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://bedrock.rerktserver.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Bedrock AI health check returned HTTP $STATUS (SSL cert may need renewal for new subdomain)"
          else
            echo "Bedrock AI health check passed — HTTP $STATUS"
          fi

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Portfolio | \`${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Rerkt.AI | \`${{ env.AI_IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bedrock AI | \`${{ env.BEDROCK_IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | OIDC (no static keys) |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed at | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Live |" >> $GITHUB_STEP_SUMMARY

  # ── JOB 3: Notify on failure ─────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Pipeline failed. Check GitHub Actions for details."