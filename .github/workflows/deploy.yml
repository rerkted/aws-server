# ─── .github/workflows/deploy.yml ────────────────────────────────
# Full CI/CD: Security → Build → Deploy → Verify → DAST → Cleanup → Done
# Auth: OIDC federation — no long-lived AWS access keys

name: Build & Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: portfolio
  AI_IMAGE_NAME: rerkt-ai
  BEDROCK_IMAGE_NAME: bedrock-ai

jobs:
  # ── STAGE 1: Security Scans ───────────────────────────────────
  security:
    name: "Stage 1 — Security"
    uses: rerkted/devsecops-pipeline/.github/workflows/security.yml@main
    with:
      terraform-dir: terraform
      node-dirs: '. chat bedrock'
      language: javascript
      severity-threshold: HIGH
    permissions:
      security-events: write
      actions: read
      contents: read

  # ── STAGE 2: Build & Push Docker Images ───────────────────────
  build:
    name: "Stage 2 — Build"
    runs-on: ubuntu-latest
    needs: security
    permissions:
      id-token: write
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata (portfolio)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Extract metadata (ai proxy)
        id: meta-ai
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.AI_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Extract metadata (bedrock proxy)
        id: meta-bedrock
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.BEDROCK_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push portfolio image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Rerkt.AI proxy image
        uses: docker/build-push-action@v5
        with:
          context: ./chat
          push: true
          tags: ${{ steps.meta-ai.outputs.tags }}
          labels: ${{ steps.meta-ai.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push Bedrock proxy image
        uses: docker/build-push-action@v5
        with:
          context: ./bedrock
          push: true
          tags: ${{ steps.meta-bedrock.outputs.tags }}
          labels: ${{ steps.meta-bedrock.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan portfolio image (Trivy)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Scan Rerkt.AI image (Trivy)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.AI_IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Scan Bedrock AI image (Trivy)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.BEDROCK_IMAGE_NAME }}:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

  # ── STAGE 3: Deploy to EC2 ────────────────────────────────────
  deploy:
    name: "Stage 3 — Deploy"
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        timeout-minutes: 70
        run: |
          PORTFOLIO_IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.IMAGE_NAME }}:latest"
          AI_IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.AI_IMAGE_NAME }}:latest"
          BEDROCK_IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.BEDROCK_IMAGE_NAME }}:latest"
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "/rerktserver/portfolio/instance-id" \
            --query "Parameter.Value" \
            --output text)
          REGISTRY="${{ needs.build.outputs.ecr-registry }}"

          COMMAND=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 3600 \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY\",

              \"docker pull $PORTFOLIO_IMAGE\",
              \"docker stop portfolio || true\",
              \"docker rm portfolio || true\",
              \"docker run -d --name portfolio --restart always -p 80:80 -p 443:443 -v /etc/letsencrypt:/etc/letsencrypt:ro -v /var/www/certbot:/var/www/certbot $PORTFOLIO_IMAGE nginx -c /etc/nginx/nginx-ssl.conf -g 'daemon off;'\",

              \"docker pull $AI_IMAGE\",
              \"docker stop rerkt-ai || true\",
              \"docker rm rerkt-ai || true\",
              \"ANTHROPIC_KEY=\$(aws ssm get-parameter --name /rerktserver/anthropic-api-key --with-decryption --query Parameter.Value --output text --region ${{ env.AWS_REGION }})\",
              \"docker run -d --name rerkt-ai --restart always -p 172.17.0.1:3001:3001 -e ANTHROPIC_API_KEY=\$ANTHROPIC_KEY $AI_IMAGE\",

              \"docker pull $BEDROCK_IMAGE\",
              \"docker stop bedrock-ai || true\",
              \"docker rm bedrock-ai || true\",
              \"docker run -d --name bedrock-ai --restart always -p 172.17.0.1:3002:3002 $BEDROCK_IMAGE\"
              # Promtail: managed automatically by sync-loki-url.timer (starts/stops based on grafana SSM param)
              # , \"systemctl is-active promtail || systemctl start promtail\"
              # Node Exporter: kept running via --restart always from bootstrap (scraping disabled when grafana is down)
              # , \"docker inspect node-exporter &>/dev/null || docker run -d --name node-exporter --restart always --pid host --network host -v /:/host:ro,rslave prom/node-exporter:v1.8.2 --path.rootfs=/host\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND"

          for i in $(seq 1 240); do
            sleep 15
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "[$i/240] Status: $STATUS"
            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              break
            fi
          done

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "SSM command failed with status: $STATUS"
            aws ssm get-command-invocation \
              --command-id "$COMMAND" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" \
              --output text
            exit 1
          fi

          echo "Deployment complete"

  # ── STAGE 4: Verify ───────────────────────────────────────────
  verify:
    name: "Stage 4 — Verify"
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Health check — Portfolio
        run: |
          sleep 10
          PORTFOLIO_IP=$(aws ssm get-parameter \
            --name "/rerktserver/portfolio/eip" \
            --query "Parameter.Value" --output text)
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://$PORTFOLIO_IP/health)
          if [ "$STATUS" != "200" ]; then
            echo "Portfolio health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Portfolio health check passed — HTTP $STATUS"

      - name: Health check — Rerkt.AI
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://ai.rerktserver.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Rerkt.AI health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Rerkt.AI health check passed — HTTP $STATUS"

      - name: Health check — Bedrock AI
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" https://bedrock.rerktserver.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Bedrock AI health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Bedrock AI health check passed — HTTP $STATUS"

  # ── STAGE 5: DAST ─────────────────────────────────────────────
  dast:
    name: "Stage 5 — DAST"
    needs: verify
    uses: rerkted/devsecops-pipeline/.github/workflows/dast.yml@main
    with:
      target-url: https://rerktserver.com
      severity-threshold: HIGH
    permissions:
      contents: read
      issues: write

  # ── STAGE 6: Cleanup ──────────────────────────────────────────
  cleanup:
    name: "Stage 6 — Cleanup"
    needs: dast
    uses: rerkted/devsecops-pipeline/.github/workflows/cleanup.yml@main
    with:
      ssm-instance-param: /rerktserver/portfolio/instance-id
      aws-region: us-east-1
    secrets:
      role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
    permissions:
      id-token: write
      contents: read

  # ── STAGE 7: Done ─────────────────────────────────────────────
  done:
    name: "Stage 7 — Done"
    needs: [security, build, deploy, verify, dast, cleanup]
    if: always()
    uses: rerkted/devsecops-pipeline/.github/workflows/done.yml@main
    with:
      security-result: ${{ needs.security.result }}
      build-result: ${{ needs.build.result }}
      deploy-result: ${{ needs.deploy.result }}
      verify-result: ${{ needs.verify.result }}
      dast-result: ${{ needs.dast.result }}
      cleanup-result: ${{ needs.cleanup.result }}
      service-name: Portfolio — rerktserver.com
      service-url: https://rerktserver.com
    permissions:
      contents: read
