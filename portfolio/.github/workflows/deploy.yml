# ─── .github/workflows/deploy.yml ─────────────────────────────
# Full CI/CD: Push → Build Golden Image → Push to ECR → Deploy to EC2
# Zero-downtime rolling deploy

name: Build & Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger

env:
  AWS_REGION: us-east-1
  IMAGE_NAME: portfolio

jobs:
  # ── JOB 1: Build & Push Docker Image (Golden Image) ──────────
  build:
    name: 🐳 Build & Push Golden Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '0'  # Don't fail on findings, just report
          severity: 'CRITICAL,HIGH'

  # ── JOB 2: Deploy to EC2 ─────────────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM (no SSH keys needed!)
        run: |
          IMAGE="${{ needs.build.outputs.ecr-registry }}/${{ env.IMAGE_NAME }}:latest"
          INSTANCE_ID="${{ secrets.EC2_INSTANCE_ID }}"

          COMMAND=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[
              \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ needs.build.outputs.ecr-registry }}\",
              \"docker pull $IMAGE\",
              \"docker stop portfolio || true\",
              \"docker rm portfolio || true\",
              \"docker run -d --name portfolio --restart always -p 80:80 $IMAGE\",
              \"docker image prune -f\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND"

          # Wait for deployment to complete
          aws ssm wait command-executed \
            --command-id "$COMMAND" \
            --instance-id "$INSTANCE_ID"

          echo "✅ Deployment complete!"

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_PUBLIC_IP }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed! HTTP $STATUS"
            exit 1
          fi
          echo "✅ Health check passed! HTTP $STATUS"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed at | $(date -u) |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Live |" >> $GITHUB_STEP_SUMMARY

  # ── JOB 3: Notify on failure ─────────────────────────────────
  notify-failure:
    name: 🔔 Notify on Failure
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Pipeline failed! Check GitHub Actions for details."
          # Add Slack/email notification here if desired