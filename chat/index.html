<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rerkt.AI — Cloud & DevSecOps Assistant</title>
  <meta name="description" content="AI assistant for cloud and DevSecOps questions, powered by Edward Rerkphuritat's portfolio.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080b0f; --surface: #0e1318; --surface2: #111820;
      --border: #1c2430; --accent: #00e5ff; --accent2: #7b61ff;
      --text: #c8d6e5; --muted: #4a5a6e; --white: #f0f6ff;
      --green: #64d08e; --red: #ff6b6b;
      --mono: 'IBM Plex Mono', monospace; --display: 'Syne', sans-serif;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--mono); font-size: 14px; line-height: 1.7;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.3;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,255,0.008) 2px, rgba(0,229,255,0.008) 4px);
      pointer-events: none; z-index: 9998;
    }

    /* ── LAYOUT ── */
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; position: relative; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2rem; border-bottom: 1px solid var(--border);
      background: rgba(8,11,15,0.9); backdrop-filter: blur(20px);
      position: relative; z-index: 10; flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 1rem; }
    .logo {
      font-family: var(--display); font-weight: 800; font-size: 1.2rem;
      color: var(--white); letter-spacing: -0.02em;
    }
    .logo span { color: var(--accent); }
    .status-dot {
      display: flex; align-items: center; gap: 0.4rem;
      font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .back-link {
      font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; transition: color 0.2s;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .back-link:hover { color: var(--accent); }
    .model-badge {
      font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); border: 1px solid var(--border);
      padding: 0.2rem 0.6rem; border-radius: 2px;
    }

    /* ── MESSAGES ── */
    .messages {
      flex: 1; overflow-y: auto; padding: 2rem;
      display: flex; flex-direction: column; gap: 1.5rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── WELCOME ── */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; text-align: center;
      padding: 3rem 2rem; gap: 2rem;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .welcome-icon {
      width: 64px; height: 64px; border: 1px solid rgba(0,229,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; position: relative;
    }
    .welcome-icon::before {
      content: ''; position: absolute; inset: -4px;
      border: 1px solid rgba(0,229,255,0.08);
    }
    .welcome h1 {
      font-family: var(--display); font-size: 1.8rem; font-weight: 800;
      color: var(--white); letter-spacing: -0.03em;
    }
    .welcome h1 span { color: var(--accent); }
    .welcome p { color: var(--muted); max-width: 420px; font-size: 0.85rem; line-height: 1.8; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-top: 0.5rem; }
    .suggestion {
      padding: 0.6rem 1.1rem; border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-family: var(--mono); font-size: 0.75rem;
      cursor: pointer; transition: all 0.2s; text-align: left;
    }
    .suggestion:hover { border-color: rgba(0,229,255,0.3); color: var(--accent); background: var(--surface2); }

    /* ── MESSAGE BUBBLES ── */
    .message { display: flex; gap: 1rem; animation: fadeUp 0.3s ease both; }
    .message.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; flex-shrink: 0;
      font-family: var(--display);
    }
    .message.user .msg-avatar { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .message.assistant .msg-avatar { background: var(--surface); color: var(--accent); }
    .msg-content { max-width: 75%; display: flex; flex-direction: column; gap: 0.35rem; }
    .msg-label { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .message.user .msg-label { text-align: right; }
    .msg-bubble {
      padding: 0.9rem 1.2rem; font-size: 0.85rem; line-height: 1.75;
      border: 1px solid var(--border);
    }
    .message.user .msg-bubble {
      background: rgba(0,229,255,0.06); border-color: rgba(0,229,255,0.15); color: var(--white);
    }
    .message.assistant .msg-bubble { background: var(--surface); color: var(--text); }

    /* ── TYPING INDICATOR ── */
    .typing { display: flex; gap: 1rem; animation: fadeUp 0.3s ease both; }
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 0.9rem 1.2rem; background: var(--surface); border: 1px solid var(--border); }
    .typing-dot {
      width: 5px; height: 5px; background: var(--muted); border-radius: 50%;
      animation: typingDot 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

    /* ── INPUT AREA ── */
    .input-area {
      border-top: 1px solid var(--border); padding: 1.25rem 2rem;
      background: rgba(8,11,15,0.9); backdrop-filter: blur(20px); flex-shrink: 0;
    }
    .input-row { display: flex; gap: 0.75rem; align-items: flex-end; }
    .input-wrap { flex: 1; position: relative; }
    textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      padding: 0.85rem 1rem; color: var(--white); font-family: var(--mono);
      font-size: 0.85rem; outline: none; resize: none; line-height: 1.6;
      transition: border-color 0.2s; min-height: 48px; max-height: 140px;
    }
    textarea:focus { border-color: rgba(0,229,255,0.4); }
    textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 48px; height: 48px; background: var(--accent); border: none;
      color: var(--bg); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s; flex-shrink: 0;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
    }
    .send-btn:hover { background: var(--white); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }
    .input-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 0.6rem;
    }
    .input-hint { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .char-count { font-size: 0.6rem; color: var(--muted); }

    /* ── ERROR ── */
    .error-msg {
      padding: 0.75rem 1rem; border: 1px solid rgba(255,107,107,0.3);
      background: rgba(255,107,107,0.05); color: var(--red);
      font-size: 0.8rem; animation: fadeUp 0.3s ease both;
    }

    @media (max-width: 600px) {
      header { padding: 1rem; }
      .messages { padding: 1rem; }
      .input-area { padding: 1rem; }
      .msg-content { max-width: 88%; }
      .welcome h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo">Rerkt<span>.AI</span></div>
      <div class="status-dot"><div class="dot"></div>Online</div>
    </div>
    <div class="header-right">
      <span class="model-badge">claude-haiku</span>
      <a href="https://rerktserver.com" class="back-link">← Portfolio</a>
    </div>
  </header>

  <!-- MESSAGES -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⚡</div>
      <div>
        <h1>Rerkt<span>.AI</span></h1>
        <p>Ask me anything about Edward's cloud engineering projects, DevSecOps experience, or general AWS and infrastructure questions.</p>
      </div>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">What projects has Edward built?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">How does OIDC federation work?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">What is Edward's AWS experience?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Explain Terraform modules</button>
        <button class="suggestion" onclick="sendSuggestion(this)">What certifications does Edward hold?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">How does this portfolio work technically?</button>
      </div>
    </div>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <textarea
          id="input"
          placeholder="Ask about Edward's projects or cloud/DevSecOps topics..."
          rows="1"
          maxlength="1000"
        ></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send &middot; Shift+Enter for new line</span>
      <span class="char-count" id="charCount">0 / 1000</span>
    </div>
  </div>

</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const charCount  = document.getElementById('charCount');
  const welcomeEl  = document.getElementById('welcome');

  let conversationHistory = [];
  let isLoading = false;

  // ── AUTO RESIZE TEXTAREA ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    charCount.textContent = `${inputEl.value.length} / 1000`;
  });

  // ── ENTER TO SEND ──
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── SEND SUGGESTION ──
  function sendSuggestion(btn) {
    inputEl.value = btn.textContent;
    sendMessage();
  }

  // ── APPEND MESSAGE ──
  function appendMessage(role, content) {
    if (welcomeEl) welcomeEl.remove();

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar  = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? 'YOU' : 'AI';

    const msgContent = document.createElement('div');
    msgContent.className = 'msg-content';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Rerkt.AI';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;

    msgContent.appendChild(label);
    msgContent.appendChild(bubble);
    msg.appendChild(avatar);
    msg.appendChild(msgContent);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  // ── TYPING INDICATOR ──
  function showTyping() {
    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = 'AI';
    avatar.style.cssText = 'background:var(--surface);color:var(--accent)';

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    for (let i = 0; i < 3; i++) {
      const d = document.createElement('div');
      d.className = 'typing-dot';
      dots.appendChild(d);
    }

    typing.appendChild(avatar);
    typing.appendChild(dots);
    messagesEl.appendChild(typing);
    scrollToBottom();
  }

  function hideTyping() {
    document.getElementById('typing')?.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── SEND MESSAGE ──
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    charCount.textContent = '0 / 1000';

    // Remove any previous errors
    document.querySelector('.error-msg')?.remove();

    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });

    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      hideTyping();

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || 'Request failed');
      }

      const data = await res.json();
      appendMessage('assistant', data.response);
      conversationHistory.push({ role: 'assistant', content: data.response });

    } catch (err) {
      hideTyping();
      const errorEl = document.createElement('div');
      errorEl.className = 'error-msg';
      errorEl.textContent = `Error: ${err.message}`;
      messagesEl.appendChild(errorEl);
      scrollToBottom();
      // Remove failed message from history
      conversationHistory.pop();
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
