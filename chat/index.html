<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rerkt.AI — Cloud & DevSecOps Assistant</title>
  <meta name="description" content="AI assistant for cloud and DevSecOps questions, powered by Edward Rerkphuritat's portfolio.">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000300;
      --surface: #020a02;
      --surface2: #041004;
      --border: #0a2a0a;
      --accent: #00ff41;
      --accent-dim: #00b32c;
      --accent-glow: rgba(0,255,65,0.15);
      --text: #00cc33;
      --muted: #1a6b1a;
      --white: #ccffcc;
      --red: #ff3333;
      --mono: 'Share Tech Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; line-height: 1.7; }

    /* Matrix canvas background */
    #matrix-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0.18; pointer-events: none; }

    /* Scanlines */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,65,0.02) 2px, rgba(0,255,65,0.02) 4px);
      pointer-events: none; z-index: 9998;
    }

    /* ── LAYOUT ── */
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2rem; border-bottom: 1px solid var(--border);
      background: rgba(0,3,0,0.92); backdrop-filter: blur(10px);
      position: relative; z-index: 10; flex-shrink: 0;
    }
    header::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      box-shadow: 0 0 8px var(--accent); opacity: 0.8;
    }
    header::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,65,0.3), transparent);
    }

    .header-left { display: flex; align-items: center; gap: 1rem; }
    .logo { font-family: var(--display); font-weight: 800; font-size: 1.2rem; color: var(--accent); letter-spacing: 0.05em; text-shadow: 0 0 10px var(--accent); }
    .logo span { color: var(--white); }

    .status-dot { display: flex; align-items: center; gap: 0.4rem; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.5s ease-in-out infinite; box-shadow: 0 0 6px var(--accent); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .back-link { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; display: flex; align-items: center; gap: 0.4rem; }
    .back-link:hover { color: var(--accent); text-shadow: 0 0 8px var(--accent); }
    .model-badge { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); border: 1px solid var(--border); padding: 0.2rem 0.6rem; }

    /* ── MESSAGES ── */
    .messages { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--muted); }

    /* ── WELCOME ── */
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; padding: 3rem 2rem; gap: 2rem; animation: fadeUp 0.6s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .welcome-icon {
      width: 72px; height: 72px; border: 1px solid rgba(0,255,65,0.3);
      display: flex; align-items: center; justify-content: center; font-size: 2rem;
      position: relative; background: rgba(0,255,65,0.03);
      box-shadow: 0 0 20px rgba(0,255,65,0.1), inset 0 0 20px rgba(0,255,65,0.05);
    }
    .welcome-icon::before { content: ''; position: absolute; inset: -5px; border: 1px solid rgba(0,255,65,0.1); }
    .welcome-icon::after  { content: ''; position: absolute; inset: -10px; border: 1px solid rgba(0,255,65,0.05); }

    .welcome h1 { font-family: var(--display); font-size: 1.8rem; font-weight: 800; color: var(--accent); letter-spacing: 0.02em; text-shadow: 0 0 20px rgba(0,255,65,0.5); }
    .welcome h1 span { color: var(--white); }
    .welcome p { color: var(--muted); max-width: 420px; font-size: 0.85rem; line-height: 1.8; }

    /* Typing cursor effect on welcome */
    .terminal-line { color: var(--accent); font-size: 0.8rem; opacity: 0.7; }
    .terminal-line::after { content: '_'; animation: blink 1s infinite; }

    .suggestions { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-top: 0.5rem; }
    .suggestion {
      padding: 0.6rem 1.1rem; border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-family: var(--mono); font-size: 0.75rem;
      cursor: pointer; transition: all 0.2s; text-align: left;
    }
    .suggestion::before { content: '> '; color: var(--accent-dim); }
    .suggestion:hover { border-color: rgba(0,255,65,0.4); color: var(--accent); background: var(--surface2); box-shadow: 0 0 8px rgba(0,255,65,0.1); }

    /* ── MESSAGE BUBBLES ── */
    .message { display: flex; gap: 1rem; animation: fadeUp 0.3s ease both; }
    .message.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; flex-shrink: 0;
      font-family: var(--mono);
    }
    .message.user .msg-avatar { background: rgba(0,255,65,0.1); color: var(--accent); border-color: rgba(0,255,65,0.3); }
    .message.assistant .msg-avatar { background: var(--surface); color: var(--accent-dim); border-color: var(--border); }

    .msg-content { max-width: 75%; display: flex; flex-direction: column; gap: 0.35rem; }
    .msg-label { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .message.user .msg-label { text-align: right; }

    .msg-bubble { padding: 0.9rem 1.2rem; font-size: 0.85rem; line-height: 1.75; border: 1px solid var(--border); position: relative; }
    .message.user .msg-bubble { background: rgba(0,255,65,0.04); border-color: rgba(0,255,65,0.15); color: var(--white); }
    .message.assistant .msg-bubble { background: var(--surface); color: var(--text); }
    .message.assistant .msg-bubble::before {
      content: ''; position: absolute; top: 0; left: 0; width: 2px; height: 100%;
      background: linear-gradient(180deg, var(--accent), transparent); opacity: 0.5;
    }
    /* Prompt prefix on user messages */
    .message.user .msg-label::before { content: '~/rerkt $ '; color: var(--accent); }

    /* ── TYPING ── */
    .typing { display: flex; gap: 1rem; animation: fadeUp 0.3s ease both; }
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 0.9rem 1.2rem; background: var(--surface); border: 1px solid var(--border); }
    .typing-dot { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: typingDot 1.2s ease-in-out infinite; opacity: 0.4; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingDot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

    /* ── INPUT ── */
    .input-area { border-top: 1px solid var(--border); padding: 1.25rem 2rem; background: rgba(0,3,0,0.92); backdrop-filter: blur(10px); flex-shrink: 0; position: relative; }
    .input-area::before { content: ''; position: absolute; top: -1px; left: 5%; right: 5%; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,255,65,0.2), transparent); }

    .input-row { display: flex; gap: 0.75rem; align-items: flex-end; }
    .input-wrap { flex: 1; position: relative; }
    .input-prefix { position: absolute; left: 0.85rem; bottom: 0.85rem; color: var(--accent); font-size: 0.85rem; pointer-events: none; z-index: 1; line-height: 1.6; }

    textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      padding: 0.85rem 1rem 0.85rem 2.2rem; color: var(--white); font-family: var(--mono);
      font-size: 0.85rem; outline: none; resize: none; line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s; min-height: 48px; max-height: 140px;
    }
    textarea:focus { border-color: rgba(0,255,65,0.4); box-shadow: 0 0 8px rgba(0,255,65,0.1); }
    textarea::placeholder { color: var(--muted); }

    .send-btn {
      width: 48px; height: 48px; background: transparent; border: 1px solid rgba(0,255,65,0.3);
      color: var(--accent); cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: all 0.2s; flex-shrink: 0;
      clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
    }
    .send-btn:hover { background: rgba(0,255,65,0.1); border-color: var(--accent); box-shadow: 0 0 12px rgba(0,255,65,0.2); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }

    .input-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.6rem; }
    .input-hint { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .char-count { font-size: 0.6rem; color: var(--muted); }

    /* ── ERROR ── */
    .error-msg { padding: 0.75rem 1rem; border: 1px solid rgba(255,51,51,0.3); background: rgba(255,51,51,0.05); color: var(--red); font-size: 0.8rem; animation: fadeUp 0.3s ease both; }

    @media (max-width: 600px) {
      header { padding: 1rem; }
      .messages { padding: 1rem; }
      .input-area { padding: 1rem; }
      .msg-content { max-width: 88%; }
      .welcome h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>
<div class="app">

  <header>
    <div class="header-left">
      <div class="logo">Rerkt<span>.AI</span></div>
      <div class="status-dot"><div class="dot"></div>Online</div>
    </div>
    <div class="header-right">
      <span class="model-badge">claude-haiku · anthropic</span>
      <a href="https://rerktserver.com" class="back-link">← Portfolio</a>
    </div>
  </header>

  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⬡</div>
      <div>
        <h1><span>Rerkt</span>.AI</h1>
        <p class="terminal-line">initializing cloud assistant</p>
        <p style="margin-top:1rem">Ask me anything about Edward's cloud engineering projects, DevSecOps experience, or general AWS and infrastructure questions.</p>
      </div>
      <div class="suggestions">
        <button class="suggestion" onclick="sendSuggestion(this)">What projects has Edward built?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">How does OIDC federation work?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">What is Edward's AWS experience?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">Explain Terraform modules</button>
        <button class="suggestion" onclick="sendSuggestion(this)">What certifications does Edward hold?</button>
        <button class="suggestion" onclick="sendSuggestion(this)">How does this portfolio work technically?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <span class="input-prefix">$</span>
        <textarea id="input" placeholder="ask anything..." rows="1" maxlength="1000"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send &middot; Shift+Enter for new line</span>
      <span class="char-count" id="charCount">0 / 1000</span>
    </div>
  </div>

</div>

<script>
  // ── MATRIX RAIN ──
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
  let drops = [];
  let fontSize = 14;

  function initMatrix() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const cols = Math.floor(canvas.width / fontSize);
    drops = Array(cols).fill(1);
  }

  function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 3, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.font = fontSize + 'px Share Tech Mono';
    drops.forEach((y, i) => {
      const char = chars[Math.floor(Math.random() * chars.length)];
      const x = i * fontSize;
      // Bright leading char
      ctx.fillStyle = y * fontSize < 50 ? '#ccffcc' : '#00ff41';
      ctx.fillText(char, x, y * fontSize);
      if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }

  initMatrix();
  window.addEventListener('resize', initMatrix);
  setInterval(drawMatrix, 50);

  // ── CHAT ──
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const charCount  = document.getElementById('charCount');
  let welcomeEl    = document.getElementById('welcome');
  let conversationHistory = [];
  let isLoading = false;

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    charCount.textContent = `${inputEl.value.length} / 1000`;
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function sendSuggestion(btn) {
    inputEl.value = btn.textContent.replace(/^> /, '');
    sendMessage();
  }

  function appendMessage(role, content) {
    if (welcomeEl && welcomeEl.parentNode) { welcomeEl.remove(); welcomeEl = null; }
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? 'USR' : 'AI>';
    const msgContent = document.createElement('div');
    msgContent.className = 'msg-content';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Rerkt.AI';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;
    msgContent.appendChild(label);
    msgContent.appendChild(bubble);
    msg.appendChild(avatar);
    msg.appendChild(msgContent);
    messagesEl.appendChild(msg);
    scrollToBottom();
    return bubble;
  }

  function showTyping() {
    const typing = document.createElement('div');
    typing.className = 'typing'; typing.id = 'typing';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar'; avatar.textContent = 'AI>';
    avatar.style.cssText = 'background:var(--surface);color:var(--accent-dim);border-color:var(--border)';
    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    for (let i = 0; i < 3; i++) { const d = document.createElement('div'); d.className = 'typing-dot'; dots.appendChild(d); }
    typing.appendChild(avatar); typing.appendChild(dots);
    messagesEl.appendChild(typing); scrollToBottom();
  }

  function hideTyping() { document.getElementById('typing')?.remove(); }
  function scrollToBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    isLoading = true; sendBtn.disabled = true;
    inputEl.value = ''; inputEl.style.height = 'auto'; charCount.textContent = '0 / 1000';
    document.querySelector('.error-msg')?.remove();
    appendMessage('user', text);
    conversationHistory.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });
      hideTyping();
      if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Request failed'); }
      const data = await res.json();
      appendMessage('assistant', data.response);
      conversationHistory.push({ role: 'assistant', content: data.response });
    } catch (err) {
      hideTyping();
      const errorEl = document.createElement('div');
      errorEl.className = 'error-msg';
      errorEl.textContent = `Error: ${err.message}`;
      messagesEl.appendChild(errorEl); scrollToBottom();
      conversationHistory.pop();
    }
    isLoading = false; sendBtn.disabled = false; inputEl.focus();
  }
</script>
</body>
</html>
